<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>校務行政管理系統</title>
  <style>
    /* === 核心配色與全域設定 === */
    :root {
      --bg-color: #f3f4f6;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --white: #ffffff;
      --text-main: #1f2937;
      --border: #e5e7eb;
      --sidebar-width: 260px;
    }
    
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; 
      background-color: var(--bg-color); color: var(--text-main); 
      display: flex; height: 100vh; overflow: hidden; 
    }
    
    /* === 導覽列改至左側 === */
    .sidebar-left { 
      width: var(--sidebar-width); 
      background-color: var(--white); 
      box-shadow: 2px 0 15px rgba(0,0,0,0.05); /* 陰影改向右 */
      padding: 30px 20px;
      display: flex; flex-direction: column; gap: 15px;
      z-index: 10;
    }
    .sys-title { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 20px; text-align: center; letter-spacing: 1px;}
    
    .nav-btn {
      background-color: transparent; border: 1px solid var(--border); padding: 15px; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer; text-align: left; transition: all 0.2s;
    }
    .nav-btn:hover { background-color: #eff6ff; border-color: var(--primary); color: var(--primary); transform: translateX(3px); }
    .nav-btn.active { background-color: var(--primary); color: var(--white); box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }

    /* === 右側主內容區 === */
    .main-content { 
      flex: 1; padding: 40px; overflow-y: auto; 
    }
    
    /* === 視圖切換 (隱藏/顯示) === */
    .view-section { display: none; background: var(--white); padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    .view-section.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    h2 { margin-top: 0; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; color: var(--text-main); }
    
    /* === 表格設計 === */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; font-size: 15px; }
    th, td { padding: 15px; border-bottom: 1px solid var(--border); }
    th { background-color: #f9fafb; font-weight: 600; color: #6b7280; }
    tbody tr:hover td { background-color: #f8fafc; }
    
    /* === 課程內部分頁 (Tabs) === */
    .course-tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    .tab-btn { 
      padding: 10px 20px; border: none; background: transparent; border-radius: 8px; 
      cursor: pointer; font-weight: 600; color: #6b7280; transition: 0.2s;
    }
    .tab-btn:hover { background: var(--bg-color); color: var(--text-main); }
    .tab-btn.active { background: #eff6ff; color: var(--primary); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

    /* === 動作按鈕 & 輸入框 === */
    .action-btn { background-color: var(--primary); color: var(--white); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .action-btn:hover { background-color: var(--primary-hover); }
    .score-input { width: 60px; padding: 6px; border: 1px solid var(--border); border-radius: 4px; text-align: center; font-weight: bold;}
    .link-style { color: var(--primary); text-decoration: none; font-weight: 600; }
    .link-style:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <aside class="sidebar-left">
    <div class="sys-title">✦ 陽明交大<br>課程管理系統</div>
    <button class="nav-btn active" id="btn-home" onclick="switchMainView('home', this)">🏠 系統首頁</button>
    <button class="nav-btn" id="btn-students" onclick="switchMainView('students', this)">🧑‍🎓 全校名單</button>
    <button class="nav-btn" id="btn-courses" onclick="switchMainView('courses', this)">📚 課程管理</button>
  </aside>

  <main class="main-content">
    
    <div id="view-home" class="view-section active">
      <h2>🏠 歡迎使用校務行政系統</h2>
      <p style="color: #6b7280; line-height: 1.6;">請透過左側導覽列選擇您要進行的業務。</p>
      <div style="background: #e0f2fe; padding: 20px; border-radius: 10px; margin-top: 30px;">
        <h4 style="margin: 0 0 10px 0; color: #0369a1;">⚡ 系統狀態</h4>
        <p id="connection-status" style="margin: 0; font-weight: bold; color: #0284c7;">正在等待連線至 Render 伺服器...</p>
      </div>
    </div>

    <div id="view-students" class="view-section">
      <h2>🧑‍🎓 全校學生名單</h2>
      <button class="action-btn" onclick="fetchStudentsFromAPI()">重新整理名單</button>
      <table>
        <thead><tr><th>學號</th><th>班級</th><th>座號</th><th>姓名</th></tr></thead>
        <tbody id="students-tbody">
          <tr><td colspan="4" style="text-align: center; color: #6b7280;">請點擊上方按鈕撈取資料...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="view-courses" class="view-section">
      <h2>📚 本學期開課清單</h2>
      <button class="action-btn" onclick="fetchCoursesFromAPI()" style="margin-bottom:15px;">載入開課清單</button>
      <table>
        <thead><tr><th>課程代碼</th><th>課程名稱</th><th>學期</th><th>操作</th></tr></thead>
        <tbody id="courses-tbody">
          <tr><td colspan="4" style="text-align: center; color: #6b7280;">請點擊上方按鈕撈取資料...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="view-course-detail" class="view-section">
      <button class="action-btn" style="background-color: #6b7280; margin-bottom: 20px;" onclick="switchMainView('courses')">⬅ 返回課程列表</button>
      <h2 id="course-detail-title">課程名稱</h2>
      
      <div class="course-tabs">
        <button class="tab-btn active" onclick="switchCourseTab('roster', this)">📝 修課名單</button>
        <button class="tab-btn" onclick="switchCourseTab('scores', this)">📊 成績登錄</button>
        <button class="tab-btn" onclick="switchCourseTab('portfolios', this)">📁 作品管理</button>
      </div>

      <div id="tab-roster" class="tab-content active">
        <table>
          <thead><tr><th>學號</th><th>班級</th><th>座號</th><th>姓名</th></tr></thead>
          <tbody id="roster-tbody">
            <tr><td colspan="4" style="text-align: center;">載入中...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="tab-scores" class="tab-content">
        <div style="text-align: right; margin-bottom: 15px;">
          <button class="action-btn" style="background-color: #10b981;" onclick="alert('成績已送出至資料庫 (待實作 POST)')">💾 儲存所有成績</button>
        </div>
        <table>
          <thead><tr><th>學號</th><th>班級</th><th>座號</th><th>姓名</th><th>評量項目</th><th>分數</th></tr></thead>
          <tbody id="scores-tbody">
            <tr><td colspan="6" style="text-align: center;">載入中...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="tab-portfolios" class="tab-content">
        <table>
          <thead><tr><th>班級</th><th>座號</th><th>姓名</th><th>作品名稱</th><th>作品連結</th><th>上傳日期</th></tr></thead>
          <tbody id="portfolios-tbody">
            <tr><td colspan="6" style="text-align: center;">載入中...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script>
    const baseUrl = 'https://db-vh7z.onrender.com/api';
    let currentCourseId = '';

    function switchMainView(viewId, btnElement = null) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      
      if(btnElement) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
      } else {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + viewId).classList.add('active');
      }
    }

    function switchCourseTab(tabId, btnElement) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      btnElement.classList.add('active');
    }

    // 進入單一課程，並自動聯動後端 API 撈取該課程所有資料
    function enterCourse(courseId, courseName) {
      currentCourseId = courseId;
      switchMainView('course-detail');
      document.getElementById('course-detail-title').innerText = `📑 ${courseName} (${courseId})`;
      document.querySelector('.tab-btn').click(); 

      // 呼叫三支不同的 API 撈取該課程專屬資料
      fetchCourseData(courseId, 'roster');
      fetchCourseData(courseId, 'scores');
      fetchCourseData(courseId, 'portfolios');
    }

    // 動態向後端要資料的通用函式
    function fetchCourseData(courseId, type) {
      const tbody = document.getElementById(`${type}-tbody`);
      tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">資料載入中...</td></tr>`;
      
      fetch(`${baseUrl}/course/${courseId}/${type}`)
        .then(res => res.json())
        .then(data => {
          tbody.innerHTML = '';
          if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">目前沒有資料</td></tr>`;
            return;
          }
          data.forEach(item => {
            if (type === 'roster') {
              tbody.innerHTML += `<tr><td>${item.STU_ID}</td><td>${item.CLASS_NAME}</td><td>${item.SEAT_NUM}</td><td>${item.STU_NAME}</td></tr>`;
            } else if (type === 'scores') {
              tbody.innerHTML += `<tr><td>${item.STU_ID}</td><td>${item.CLASS_NAME}</td><td>${item.SEAT_NUM}</td><td>${item.STU_NAME}</td><td>${item.AST_NAME}</td><td><input type="number" class="score-input" value="${item.SCORE}"></td></tr>`;
            } else if (type === 'portfolios') {
              tbody.innerHTML += `<tr><td>${item.CLASS_NAME}</td><td>${item.SEAT_NUM}</td><td>${item.STU_NAME}</td><td>${item.PORT_NAME}</td><td><a href="${item.PORT_LINK}" class="link-style" target="_blank">🔗 雲端連結</a></td><td>${item.UPLOAD_DATE}</td></tr>`;
            }
          });
        })
        .catch(() => tbody.innerHTML = '<tr><td colspan="6" style="color:red; text-align: center;">資料讀取失敗，請確認後端已更新</td></tr>');
    }

    // 系統啟動測試
    window.onload = () => {
      fetch(`${baseUrl}/`)
        .then(res => res.ok ? document.getElementById('connection-status').innerHTML = '✅ 連線成功！' : throwError())
        .catch(() => document.getElementById('connection-status').innerHTML = '❌ 連線失敗');
    };

    function fetchStudentsFromAPI() {
      const tbody = document.getElementById('students-tbody');
      fetch(`${baseUrl}/students`).then(res => res.json()).then(data => {
        tbody.innerHTML = '';
        data.forEach(item => {
          tbody.innerHTML += `<tr><td style="font-weight:bold;">${item.STU_ID}</td><td>${item.CLASS_NAME}</td><td>${item.SEAT_NUM}</td><td>${item.STU_NAME}</td></tr>`;
        });
      });
    }

    function fetchCoursesFromAPI() {
      const tbody = document.getElementById('courses-tbody');
      fetch(`${baseUrl}/courses`).then(res => res.json()).then(data => {
        tbody.innerHTML = '';
        data.forEach(item => {
          tbody.innerHTML += `<tr><td>${item.COURSE_ID}</td><td>${item.COURSE_NAME}</td><td>${item.SEMESTER}</td><td><button class="action-btn" onclick="enterCourse('${item.COURSE_ID}', '${item.COURSE_NAME}')">進入管理</button></td></tr>`;
        });
      });
    }
  </script>
</body>
</html>
