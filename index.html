<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>NYCU 校務行政系統</title>
  <style>
    :root {
      --bg-color: #f3f4f6;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --white: #ffffff;
      --text-main: #1f2937;
      --sidebar-width: 250px;
    }
    
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
    
    /* === 左側主內容區 === */
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    
    /* === 右側導覽列 (你的需求) === */
    .sidebar-right { 
      width: var(--sidebar-width); 
      background-color: var(--white); 
      box-shadow: -2px 0 10px rgba(0,0,0,0.05); 
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .sys-title { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 30px; text-align: center; }
    
    .nav-btn {
      background-color: transparent; border: 1px solid #e5e7eb; padding: 15px; border-radius: 8px;
      font-size: 16px; font-weight: bold; cursor: pointer; text-align: left; transition: 0.2s;
    }
    .nav-btn:hover { background-color: #eff6ff; border-color: var(--primary); color: var(--primary); }
    .nav-btn.active { background-color: var(--primary); color: var(--white); }

    /* === 視圖切換 (隱藏/顯示) === */
    .view-section { display: none; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .view-section.active { display: block; }
    
    h2 { margin-top: 0; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; }
    
    /* === 表格與次選單設計 === */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
    th, td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
    th { background-color: #f9fafb; font-weight: 600; }
    
    .course-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { padding: 8px 16px; border: none; background: #e5e7eb; border-radius: 20px; cursor: pointer; font-weight: bold;}
    .tab-btn:hover, .tab-btn.active { background: var(--primary); color: var(--white); }
  </style>
</head>
<body>

  <main class="main-content">
    
    <div id="view-home" class="view-section active">
      <h2>🏠 系統首頁</h2>
      <p>歡迎登入！請使用右側選單進行操作。</p>
      <div id="connection-status" style="padding: 15px; background: #e0f2fe; border-radius: 8px; color: #0369a1; font-weight: bold;">
        等待連線測試中...
      </div>
    </div>

    <div id="view-students" class="view-section">
      <h2>🧑‍🎓 全校學生名單</h2>
      <button onclick="loadAllStudents()" style="padding: 8px 15px; cursor: pointer;">重新整理名單</button>
      <table>
        <thead><tr><th>學號</th><th>姓名</th><th>班級</th></tr></thead>
        <tbody id="all-students-tbody">
          <tr><td colspan="3">請點擊上方按鈕載入資料...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="view-courses" class="view-section">
      <h2>📚 所有開課課程</h2>
      <p>以下為目前學期的課程，點擊可進入詳細管理介面（待後端 API 補齊後啟用）。</p>
      <table>
        <thead><tr><th>課程代碼</th><th>課程名稱</th><th>操作</th></tr></thead>
        <tbody>
          <tr><td>C001</td><td>資料庫系統</td><td><button onclick="enterCourse('C001')">進入管理</button></td></tr>
          <tr><td>C002</td><td>工程數學</td><td><button onclick="enterCourse('C002')">進入管理</button></td></tr>
        </tbody>
      </table>
    </div>

    <div id="view-course-detail" class="view-section">
      <h2 id="course-detail-title">課程管理</h2>
      <button onclick="switchView('courses')" style="margin-bottom: 15px;">⬅ 返回課程列表</button>
      
      <div class="course-tabs">
        <button class="tab-btn active">📝 修課名單</button>
        <button class="tab-btn">📊 成績表 (可編輯)</button>
        <button class="tab-btn">📁 作品表</button>
      </div>

      <div style="padding: 40px; text-align: center; color: #6b7280; border: 2px dashed #e5e7eb; border-radius: 8px;">
        這裡的畫面結構已經準備好！<br>
        下一步需要去 Render 的 app.py 撰寫對應的 SQL API 才能撈出資料。
      </div>
    </div>

  </main>

  <aside class="sidebar-right">
    <div class="sys-title">校務行政系統</div>
    <button class="nav-btn active" onclick="switchView('home', this)">首頁</button>
    <button class="nav-btn" onclick="switchView('students', this); loadAllStudents();">名單 (全校學生)</button>
    <button class="nav-btn" onclick="switchView('courses', this)">課程 (開課列表)</button>
  </aside>

  <script>
    // 記得換成你的 Render 網址
    const baseUrl = 'https://db-vh7z.onrender.com/api';

    // 畫面切換魔法
    function switchView(viewId, btnElement = null) {
      // 隱藏所有畫面
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      // 顯示目標畫面
      document.getElementById('view-' + viewId).classList.add('active');
      
      // 更新按鈕顏色
      if(btnElement) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
      }
    }

    // 進入特定課程
    function enterCourse(courseId) {
      switchView('course-detail');
      document.getElementById('course-detail-title').innerText = `課程管理 (${courseId})`;
      // 這裡未來會加入呼叫 API 的功能
    }

    // 測試連線與載入學生名單 (使用你現有的 API)
    window.onload = () => {
      fetch(`${baseUrl}/students`)
        .then(res => res.ok ? document.getElementById('connection-status').innerText = '✅ 後端 API 連線成功！' : throwError())
        .catch(() => document.getElementById('connection-status').innerText = '❌ 連線失敗，請檢查 Render。');
    };

    function loadAllStudents() {
      const tbody = document.getElementById('all-students-tbody');
      tbody.innerHTML = '<tr><td colspan="3">載入中...</td></tr>';
      fetch(`${baseUrl}/students`)
        .then(res => res.json())
        .then(data => {
          tbody.innerHTML = '';
          data.forEach(item => {
            // 注意：如果你的 class_name API 沒傳過來，這裡會是 undefined，我們後端要補
            tbody.innerHTML += `<tr><td>${item.student_id}</td><td>${item.name}</td><td>${item.class_name || '未記錄'}</td></tr>`;
          });
        });
    }
  </script>
</body>
</html>
